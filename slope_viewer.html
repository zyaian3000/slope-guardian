<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>法面3Dモデル｜斜面診断 No.001</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#1a2340;--wine:#8b2035;--white:#ffffff}
body{background:var(--navy);color:var(--white);font-family:sans-serif;min-height:100vh;display:flex;flex-direction:column}
header{background:linear-gradient(135deg,#1a2340 0%,#0d1525 100%);border-bottom:3px solid var(--wine);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo-area{display:flex;align-items:center;gap:12px}
.logo-icon{width:40px;height:40px;background:var(--wine);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:20px}
.logo-main{font-size:20px;letter-spacing:2px;color:var(--white);line-height:1;font-weight:700}
.logo-sub{font-size:10px;color:#8899aa;letter-spacing:1px}
.case-badge{background:var(--wine);color:var(--white);font-size:11px;font-weight:700;padding:4px 12px;border-radius:2px;letter-spacing:1px}
.viewer-container{flex:1;position:relative}
#canvas{width:100%;height:calc(100vh - 110px);display:block}
.loading-overlay{position:absolute;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:10;transition:opacity 0.5s}
.loading-overlay.hidden{opacity:0;pointer-events:none}
.loading-icon{font-size:48px;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.1);opacity:0.7}}
.loading-text{font-size:14px;color:#8899aa;font-weight:300;letter-spacing:2px}
.loading-bar{width:200px;height:2px;background:#2a3550;border-radius:1px;overflow:hidden}
.loading-bar-fill{height:100%;background:var(--wine);animation:loading 2s ease-in-out infinite}
@keyframes loading{0%{width:0%;margin-left:0}50%{width:70%;margin-left:0}100%{width:0%;margin-left:100%}}
.rotate-btn{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:var(--wine);color:var(--white);border:none;border-radius:24px;padding:10px 24px;font-size:13px;font-weight:700;letter-spacing:1px;cursor:pointer;z-index:20;box-shadow:0 4px 16px rgba(0,0,0,0.4);transition:background 0.2s}
.rotate-btn:hover{background:#a02040}
.rotate-btn.stopped{background:#2a3550}
footer{background:#0d1525;border-top:1px solid #2a3550;padding:10px 20px;flex-shrink:0}
.footer-content{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.footer-info{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.info-item{display:flex;align-items:center;gap:6px;font-size:11px;color:#8899aa}
.info-dot{width:6px;height:6px;border-radius:50%;background:var(--wine);flex-shrink:0}
.operate-hint{display:flex;gap:16px}
.op-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#8899aa}
.op-key{background:#2a3550;border-radius:3px;padding:2px 6px;font-size:10px;color:var(--white)}
@media(max-width:600px){.operate-hint{display:none}}
</style>
</head>
<body>
<header>
  <div class="logo-area">
    <div class="logo-icon">&#9968;</div>
    <div class="logo-text">
      <div class="logo-main">SLOPE GUARDIAN</div>
      <div class="logo-sub">斜面診断システム｜3Dモデル確認</div>
    </div>
  </div>
  <div class="case-badge">CASE No.001</div>
</header>
<div class="viewer-container">
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-icon">&#9968;</div>
    <div class="loading-text">3Dモデルを読み込んでいます...</div>
    <div class="loading-bar"><div class="loading-bar-fill"></div></div>
  </div>
  <canvas id="canvas"></canvas>
  <button class="rotate-btn" id="rotateBtn">&#9646;&#9646; 回転を止める</button>
</div>
<footer>
  <div class="footer-content">
    <div class="footer-info">
      <div class="info-item"><div class="info-dot"></div><span>撮影：UAV空撮（フォトグラメトリ）</span></div>
      <div class="info-item"><div class="info-dot"></div><span>処理：Agisoft Metashape</span></div>
      <div class="info-item"><div class="info-dot"></div><span>株式会社アイビック</span></div>
    </div>
    <div class="operate-hint">
      <div class="op-item"><span class="op-key">ドラッグ</span><span>回転</span></div>
      <div class="op-item"><span class="op-key">ピンチ</span><span>拡大縮小</span></div>
      <div class="op-item"><span class="op-key">2本指</span><span>移動</span></div>
    </div>
  </div>
</footer>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
<script>
(function(){
  var overlay=document.getElementById('loadingOverlay');
  var canvas=document.getElementById('canvas');
  var btn=document.getElementById('rotateBtn');
  var autoRotating=true;

  var W=canvas.parentElement.clientWidth;
  var H=canvas.parentElement.clientHeight;

  var scene=new THREE.Scene();
  scene.background=new THREE.Color(0x1a2340);
  var camera=new THREE.PerspectiveCamera(45,W/H,0.1,10000);
  var renderer=new THREE.WebGLRenderer({canvas:canvas,antialias:true});
  renderer.setSize(W,H);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.outputEncoding=THREE.sRGBEncoding;

  var ambient=new THREE.AmbientLight(0xffffff,0.8);
  scene.add(ambient);
  var dir=new THREE.DirectionalLight(0xffffff,0.6);
  dir.position.set(100,200,100);
  scene.add(dir);

  var controls=new THREE.OrbitControls(camera,renderer.domElement);
  controls.enableDamping=true;
  controls.dampingFactor=0.05;
  controls.minPolarAngle=0;
  controls.maxPolarAngle=Math.PI;
  controls.enableZoom=true;
  controls.enablePan=true;

  controls.addEventListener('start',function(){
    autoRotating=false;
    btn.innerHTML='&#9654; 回転を再開する';
    btn.classList.add('stopped');
  });

  btn.addEventListener('click',function(){
    autoRotating=!autoRotating;
    if(autoRotating){
      btn.innerHTML='&#9646;&#9646; 回転を止める';
      btn.classList.remove('stopped');
    } else {
      btn.innerHTML='&#9654; 回転を再開する';
      btn.classList.add('stopped');
    }
  });

  var dracoLoader=new THREE.DRACOLoader();
  dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/draco/');

  var loader=new THREE.GLTFLoader();
  loader.setDRACOLoader(dracoLoader);
  loader.load('./slope_001_small-v1.glb',function(gltf){
    var model=gltf.scene;
    var box=new THREE.Box3().setFromObject(model);
    var center=box.getCenter(new THREE.Vector3());
    model.position.sub(center);
    scene.add(model);
    var size=box.getSize(new THREE.Vector3()).length();
    camera.position.set(0,size*0.5,size*1.2);
    controls.target.set(0,0,0);
    controls.update();
    overlay.classList.add('hidden');
  },null,function(err){
    overlay.classList.add('hidden');
    console.error(err);
  });

  function animate(){
    requestAnimationFrame(animate);
    if(autoRotating){
      scene.rotation.y+=0.005;
    }
    controls.update();
    renderer.render(scene,camera);
  }
  animate();

  window.addEventListener('resize',function(){
    var W2=canvas.parentElement.clientWidth;
    var H2=canvas.parentElement.clientHeight;
    camera.aspect=W2/H2;
    camera.updateProjectionMatrix();
    renderer.setSize(W2,H2);
  });

  setTimeout(function(){overlay.classList.add('hidden')},20000);
})();
</script>
</body>
</html>
